name: Feature request
description: Suggest a new component or improvement
labels: [enhancement]
body:
  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - New component
        - Improvement to existing component
        - API change
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: api
    attributes:
      label: Proposed API (optional)
      description: If applicable, sketch the component selector, inputs, outputs
      render: html
