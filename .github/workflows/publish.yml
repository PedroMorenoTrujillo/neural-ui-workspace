name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    name: Test library
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build:
    name: Build library
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: neural-ui-core-dist
          path: dist/neural-ui/core
          if-no-files-found: error

  publish:
    name: Publish package
    runs-on: ubuntu-latest
    needs: [test, build]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: neural-ui-core-dist
          path: dist/neural-ui/core

      - name: Verify tag matches package version
        run: |
          PACKAGE_VERSION=$(node -p "require('./dist/neural-ui/core/package.json').version")
          if [ "$GITHUB_REF_NAME" != "v$PACKAGE_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package version v$PACKAGE_VERSION"
            exit 1
          fi

      - name: Publish to npm
        run: npm publish dist/neural-ui/core --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
