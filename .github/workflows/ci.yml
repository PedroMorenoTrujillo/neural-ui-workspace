name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify-release:
    name: Verify release gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run release verification
        run: npm run verify:release

      - name: Upload compiled package
        uses: actions/upload-artifact@v4
        with:
          name: neural-ui-core-dist
          path: dist/neural-ui/core
          if-no-files-found: error
