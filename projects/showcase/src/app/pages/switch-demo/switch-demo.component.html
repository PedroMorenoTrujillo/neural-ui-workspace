<div class="demo-page">
  <div class="demo-hero">
    <neu-badge variant="info" size="sm">{{ 'demo.common.componentBadge' | transloco }}</neu-badge>
    <h1 class="demo-hero__title">Switch</h1>
    <p class="demo-hero__desc" [innerHTML]="'demo.switch.desc' | transloco"></p>
  </div>

  <section class="demo-section">
    <neu-tabs [tabs]="demoTabs" tabParam="tab">
      <!-- PREVIEW -->
      <neu-tab-panel tabId="preview">
        <div class="demo-preview demo-preview--tabs">
          <div
            class="demo-preview__canvas"
            style="display: flex; flex-direction: column; gap: 16px"
          >
            <neu-switch label="Notificaciones push" [(ngModel)]="notifications" />
            <neu-switch label="Suscripción newsletter" [(ngModel)]="newsletter" />
            <neu-switch label="Opción deshabilitada (on)" [disabled]="true" [ngModel]="true" />
            <neu-switch label="Opción deshabilitada (off)" [disabled]="true" [ngModel]="false" />
          </div>
        </div>
      </neu-tab-panel>

      <!-- CONFIGURADOR -->
      <neu-tab-panel tabId="config">
        <div class="demo-preview demo-preview--tabs">
          <div class="demo-configurator">
            <div class="demo-configurator__preview">
              <neu-switch [label]="cfg.label" [disabled]="cfg.disabled" [(ngModel)]="cfgVal" />
            </div>
            <div class="demo-configurator__controls">
              <span class="demo-configurator__controls-title">Configurar</span>

              <div class="demo-configurator__control-row">
                <label>Label</label>
                <input
                  class="demo-select"
                  type="text"
                  [value]="cfg.label"
                  (input)="cfg.label = $any($event.target).value"
                  style="width: 150px"
                />
              </div>

              <div class="demo-configurator__control-row">
                <label for="sw-disabled">disabled</label>
                <label class="demo-toggle">
                  <input
                    id="sw-disabled"
                    type="checkbox"
                    [checked]="cfg.disabled"
                    (change)="cfg.disabled = $any($event.target).checked"
                  />
                  <span class="demo-toggle__track"></span>
                </label>
              </div>
            </div>
          </div>
        </div>
        <div class="demo-configurator__snippet">
          <neu-code-block [code]="configCode" lang="HTML" />
        </div>
      </neu-tab-panel>

      <!-- API -->
      <neu-tab-panel tabId="api">
        <div style="padding: 24px 0">
          <div class="demo-api-table-wrapper">
            <table class="demo-api-table">
              <thead>
                <tr>
                  <th>Input</th>
                  <th>{{ 'demo.common.api.type' | transloco }}</th>
                  <th>Default</th>
                  <th>{{ 'demo.common.api.desc' | transloco }}</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td><code>label</code></td>
                  <td><code>string</code></td>
                  <td><code>''</code></td>
                  <td>Texto junto al toggle</td>
                </tr>
                <tr>
                  <td><code>disabled</code></td>
                  <td><code>boolean</code></td>
                  <td><code>false</code></td>
                  <td>Deshabilita el toggle</td>
                </tr>
              </tbody>
            </table>
          </div>
          <h3 class="demo-section__subtitle">Uso básico</h3>

          <neu-code-block [code]="usageCode" lang="TypeScript" />
        </div>
      </neu-tab-panel>
    </neu-tabs>
  </section>
</div>
