<!-- Neural Admin Pro — App Shell -->
<div class="admin-layout" [class.admin-layout--sidebar-open]="isDesktop()">

  <!-- ===== SIDEBAR ===== -->
  <neu-sidebar class="admin-sidebar" urlParam="menu" [persistent]="isDesktop()!!">
    <!-- Brand -->
    <div neu-sidebar-header class="admin-brand">
      <span class="admin-brand__icon" aria-hidden="true">&#9650;</span>
      <span class="admin-brand__name">Neural<strong>Admin</strong></span>
    </div>

    <!-- Nav items -->
    <nav class="admin-nav" aria-label="Menú principal">
      @for (item of navItems; track item.route) {
        <a
          class="admin-nav__link"
          [routerLink]="item.route"
          routerLinkActive="admin-nav__link--active"
        >
          <neu-icon [name]="item.icon" size="1.125rem" aria-hidden="true" />
          <span>{{ item.labelKey | transloco }}</span>
        </a>
      }
    </nav>

    <!-- Footer -->
    <div neu-sidebar-footer class="admin-sidebar-footer">
      <button class="admin-nav__link admin-nav__link--logout" type="button">
        <neu-icon name="lucideLogOut" size="1.125rem" aria-hidden="true" />
        <span>{{ 'nav.logout' | transloco }}</span>
      </button>
    </div>
  </neu-sidebar>

  <!-- ===== MAIN ===== -->
  <div class="admin-main">
    <!-- Header -->
    <header class="admin-header">
      <!-- Mobile: hamburger -->
      @if (!isDesktop()) {
        <button
          class="admin-header__menu-btn"
          type="button"
          (click)="openMenu()"
          [attr.aria-label]="'header.openMenu' | transloco"
        >
          <neu-icon name="lucideMenu" size="1.25rem" />
        </button>
      }

      <!-- Search -->
      <div class="admin-header__search">
        <neu-icon name="lucideSearch" size="1rem" class="admin-header__search-icon" />
        <input
          class="admin-header__search-input"
          type="search"
          [placeholder]="'header.search' | transloco"
          aria-label="Buscar"
        />
      </div>

      <!-- Right actions -->
      <div class="admin-header__actions">
        <!-- Language toggle -->
        <button
          class="admin-header__action-btn"
          type="button"
          (click)="toggleLang()"
          [attr.aria-label]="'Cambiar idioma'"
        >
          {{ i18n.lang() === 'es' ? 'ES' : 'EN' }}
        </button>

        <!-- Notifications -->
        <button
          class="admin-header__action-btn admin-header__action-btn--icon"
          type="button"
          [attr.aria-label]="'header.notifications' | transloco"
        >
          <neu-icon name="lucideBell" size="1.125rem" />
          <span class="admin-header__badge" aria-hidden="true">3</span>
        </button>

        <!-- Avatar -->
        <neu-avatar name="Admin User" size="sm" />
      </div>
    </header>

    <!-- Page content -->
    <main class="admin-content">
      <router-outlet />
    </main>
  </div>
</div>

<!-- Toast notifications -->
<neu-toast-container />
